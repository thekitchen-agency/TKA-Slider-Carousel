<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TKA Slider - 360 Degree Effect Demo</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #0f172a;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        header {
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .slider-instance-wrapper {
            margin-bottom: 60px;
        }

        .tka-360-container {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .tka-360-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            opacity: 0;
            /* No transition to avoid flickering with GSAP */
        }

        .tka-360-frame.is-active {
            opacity: 1;
        }

        .debug-info {
            margin-top: 20px;
            font-family: monospace;
            color: #94a3b8;
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="dist/tka-slider-carousel.css">
</head>

<body>
    <header>
        <h1>360° Object Slider</h1>
        <p>Interactive rotation based on slide position</p>
    </header>

    <div class="container">
        <div class="slider-instance-wrapper">
            <div class="tka-slider" id="slider-360">
                <div class="tka-slider__track">
                    <!-- Slide 1 -->
                    <div class="tka-slider__slide">
                        <div class="tka-360-container" data-frames="36">
                            <!-- We generate 36 frames dynamically for the demo -->
                        </div>
                    </div>
                    <!-- Slide 2 -->
                    <div class="tka-slider__slide">
                        <div class="tka-360-container" data-frames="36">
                        </div>
                    </div>
                    <!-- Slide 3 -->
                    <div class="tka-slider__slide">
                        <div class="tka-360-container" data-frames="36">
                        </div>
                    </div>
                </div>
                <div class="tka-controls">
                    <button data-tka-control="<">←</button>
                    <button data-tka-control=">">→</button>
                </div>
            </div>
            <div class="debug-info">Drag the slider to see the 360° effect in action.</div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "gsap": "https://esm.sh/gsap@3.12.5",
            "gsap/Draggable": "https://esm.sh/gsap@3.12.5/Draggable"
        }
    }
    </script>

    <script type="module">
        import gsap from 'gsap';
        import { Draggable } from 'gsap/Draggable';
        import Slider from './src/index.js';

        gsap.registerPlugin(Draggable);

        // CONFIGURATION: These settings drive both the DOM generation and the Slider
        const sliderOptions = {
            type: '360',
            perView: 3,
            focusAt: 'center',
            gap: 20,
            loop: true,
            autoplay: 3000,
            animationDuration: 1500,
            rotationSpeed: 6 // Frames per slide width
        };

        // Determine which frames we actually need based on the viewport and rotation speed
        // Max distance from focus point for a slide being even partially visible
        const maxDist = (sliderOptions.perView / 2) + 0.5;
        const maxFrameShift = Math.ceil(maxDist * sliderOptions.rotationSpeed);
        const totalPossibleFrames = 36; // Based on the 10-degree increments in our image set

        // Generate frames based on provided images
        const carFolders = ['car_a', 'car_b', 'car_c'];
        document.querySelectorAll('.tka-360-container').forEach((container, carIdx) => {
            const folder = carFolders[carIdx];
            for (let i = 0; i < totalPossibleFrames; i++) {
                const angleValue = i * 10;

                // DYNAMIC OPTIMIZATION:
                // Check if frame 'i' is within the reach of the slider based on settings
                const isForwardInReach = i <= maxFrameShift;
                const isBackwardInReach = i >= (totalPossibleFrames - maxFrameShift);
                const isNeeded = isForwardInReach || isBackwardInReach;

                if (!isNeeded) {
                    const spacer = document.createElement('div');
                    spacer.className = 'tka-360-frame placeholder';
                    container.appendChild(spacer);
                    continue;
                }

                const angle = angleValue.toString().padStart(3, '0');
                const img = document.createElement('img');
                img.className = 'tka-360-frame';
                img.src = `images/${folder}/EXT${angle}.png`;
                img.alt = `Vehicle Rotation ${angle}°`;
                container.appendChild(img);
            }
        });

        const slider = new Slider('#slider-360', sliderOptions).mount();

    </script>
</body>

</html>
